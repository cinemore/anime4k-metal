name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS CLI
    runs-on: macos-14

    env:
      ARM64_ARCHIVE_NAME: anime4k-metal-macos-arm64
      X86_64_ARCHIVE_NAME: anime4k-metal-macos-x86_64
      UNIVERSAL_ARCHIVE_NAME: anime4k-metal-macos-universal
      RESOURCE_BUNDLE_NAME: Anime4KMetal_Anime4KMetalCore.bundle

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out source
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Build arm64 binary
        run: swift build -c release --arch arm64 --product anime4k-metal

      - name: Build x86_64 binary
        run: swift build -c release --arch x86_64 --product anime4k-metal

      - name: Package release archive
        run: |
          set -euo pipefail

          staging="$(mktemp -d)"
          mkdir -p "$staging/${ARM64_ARCHIVE_NAME}/bin"
          mkdir -p "$staging/${X86_64_ARCHIVE_NAME}/bin"
          mkdir -p "$staging/${UNIVERSAL_ARCHIVE_NAME}/bin"

          cp .build/arm64-apple-macosx/release/anime4k-metal "$staging/${ARM64_ARCHIVE_NAME}/bin/anime4k-metal"
          cp .build/x86_64-apple-macosx/release/anime4k-metal "$staging/${X86_64_ARCHIVE_NAME}/bin/anime4k-metal"
          chmod 755 "$staging/${ARM64_ARCHIVE_NAME}/bin/anime4k-metal"
          chmod 755 "$staging/${X86_64_ARCHIVE_NAME}/bin/anime4k-metal"

          lipo -create \
            .build/arm64-apple-macosx/release/anime4k-metal \
            .build/x86_64-apple-macosx/release/anime4k-metal \
            -output "$staging/${UNIVERSAL_ARCHIVE_NAME}/bin/anime4k-metal"

          chmod 755 "$staging/${UNIVERSAL_ARCHIVE_NAME}/bin/anime4k-metal"
          cp -R ".build/arm64-apple-macosx/release/${RESOURCE_BUNDLE_NAME}" "$staging/${ARM64_ARCHIVE_NAME}/bin/"
          cp -R ".build/x86_64-apple-macosx/release/${RESOURCE_BUNDLE_NAME}" "$staging/${X86_64_ARCHIVE_NAME}/bin/"
          cp -R ".build/arm64-apple-macosx/release/${RESOURCE_BUNDLE_NAME}" "$staging/${UNIVERSAL_ARCHIVE_NAME}/bin/"
          cp LICENSE THIRD-PARTY.md "$staging/${ARM64_ARCHIVE_NAME}/"
          cp LICENSE THIRD-PARTY.md "$staging/${X86_64_ARCHIVE_NAME}/"
          cp LICENSE THIRD-PARTY.md "$staging/${UNIVERSAL_ARCHIVE_NAME}/"

          tar -C "$staging" -czf "${ARM64_ARCHIVE_NAME}.tar.gz" "${ARM64_ARCHIVE_NAME}"
          tar -C "$staging" -czf "${X86_64_ARCHIVE_NAME}.tar.gz" "${X86_64_ARCHIVE_NAME}"
          tar -C "$staging" -czf "${UNIVERSAL_ARCHIVE_NAME}.tar.gz" "${UNIVERSAL_ARCHIVE_NAME}"
          shasum -a 256 "${ARM64_ARCHIVE_NAME}.tar.gz" | tee "${ARM64_ARCHIVE_NAME}.tar.gz.sha256"
          shasum -a 256 "${X86_64_ARCHIVE_NAME}.tar.gz" | tee "${X86_64_ARCHIVE_NAME}.tar.gz.sha256"
          shasum -a 256 "${UNIVERSAL_ARCHIVE_NAME}.tar.gz" | tee "${UNIVERSAL_ARCHIVE_NAME}.tar.gz.sha256"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes "macOS CLI release for $tag. Use arm64 on Apple Silicon Macs, x86_64 on Intel Macs, or universal when one archive must cover both." \
            "${ARM64_ARCHIVE_NAME}.tar.gz" \
            "${ARM64_ARCHIVE_NAME}.tar.gz.sha256" \
            "${X86_64_ARCHIVE_NAME}.tar.gz" \
            "${X86_64_ARCHIVE_NAME}.tar.gz.sha256" \
            "${UNIVERSAL_ARCHIVE_NAME}.tar.gz" \
            "${UNIVERSAL_ARCHIVE_NAME}.tar.gz.sha256"

      - name: Update Homebrew formula on default branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          arm64_sha256="$(cut -d ' ' -f 1 "${ARM64_ARCHIVE_NAME}.tar.gz.sha256")"
          x86_64_sha256="$(cut -d ' ' -f 1 "${X86_64_ARCHIVE_NAME}.tar.gz.sha256")"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          arm64_asset_url="${repo_url}/releases/download/${tag}/${ARM64_ARCHIVE_NAME}.tar.gz"
          x86_64_asset_url="${repo_url}/releases/download/${tag}/${X86_64_ARCHIVE_NAME}.tar.gz"
          default_branch="${{ github.event.repository.default_branch }}"

          git fetch origin "$default_branch"
          git checkout "$default_branch"

          ruby - "$arm64_asset_url" "$arm64_sha256" "$x86_64_asset_url" "$x86_64_sha256" <<'RUBY'
          path = "Formula/anime4k-metal.rb"
          arm64_asset_url, arm64_sha256, x86_64_asset_url, x86_64_sha256 = ARGV
          formula = File.read(path)
          formula = formula.sub(%r{url "https://github\.com/cinemore/anime4k-metal/releases/download/[^"]+/anime4k-metal-macos-arm64\.tar\.gz"}, %(url "#{arm64_asset_url}"))
          formula = formula.sub(%r{sha256 "[0-9a-f]{64}"\n  else}, %(sha256 "#{arm64_sha256}"\n  else))
          formula = formula.sub(%r{url "https://github\.com/cinemore/anime4k-metal/releases/download/[^"]+/anime4k-metal-macos-x86_64\.tar\.gz"}, %(url "#{x86_64_asset_url}"))
          formula = formula.sub(%r{sha256 "[0-9a-f]{64}"\n  end}, %(sha256 "#{x86_64_sha256}"\n  end))
          File.write(path, formula)
          RUBY

          if git diff --quiet -- Formula/anime4k-metal.rb; then
            echo "Formula already points at $tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/anime4k-metal.rb
          git commit -m "chore: update Homebrew formula for ${tag}"
          git push origin "HEAD:${default_branch}"
